<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notlarım - Soft & Nude Kişisel Asistan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            /* Soft toz pembe zemin ve çok hafif çizgisel (çapraz) şekiller */
            background-color: #fdfafb;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(228, 196, 204, 0.4) 20px, rgba(228, 196, 204, 0.4) 21px),
                repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(228, 196, 204, 0.4) 20px, rgba(228, 196, 204, 0.4) 21px);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #44403c; /* stone-700, sıcak ve yumuşak koyu ton */
        }
        
        /* Custom Scrollbar for inner areas */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e7e5e4; /* stone-200 */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d6d3d1; /* stone-300 */
        }

        /* Animation utilities */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInFromBottom { from { opacity: 0; transform: translateY(2rem); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInFromTop { from { opacity: 0; transform: translateY(-1rem); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        .animate-slide-in-bottom { animation: slideInFromBottom 0.5s ease-out forwards; }
        .animate-slide-in-top { animation: slideInFromTop 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="app-root" class="max-w-7xl mx-auto">
        <!-- App content will be injected here by JS -->
    </div>

    <!-- Feedback Toast -->
    <div id="copyFeedback" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-stone-700 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-4 border-2 border-pink-300 opacity-0 pointer-events-none transition-opacity duration-300">
        <i data-lucide="check" class="text-pink-300 w-6 h-6"></i>
        <span id="copyFeedbackText" class="font-black uppercase tracking-widest text-sm">Kopyalandı!</span>
    </div>

    <script>
        // --- STICKER VE EMOJI KÜTÜPHANESİ ---
        const stickersData = {
            motivasyon: [
                "🌸 YAPABİLİRSİN!", "✨ PARLA!", "⭐️ GÜNÜN YILDIZI", "🎀 PES ETME", "🩰 ŞAMPİYON",
                "🕊️ ADIM ADIM", "☕️ FULL ENERJİ", "🎯 ODAKLAN", "💎 DEĞERLİSİN", "🦢 İLHAM VER"
            ],
            is_dunyasi: [
                "💼 TOPLANTIDA", "⏳ DEADLINE!", "☕️ KAHVE MOLASI", "✅ ONAYLANDI", "📝 NOT ALINDI",
                "📊 VERİ ANALİZİ", "📞 ARAMA BEKLENİYOR", "🚀 LANSMAN", "💡 FİKİR!", "📈 YÜKSELİŞTE"
            ],
            komik: [
                "🤡 BEYİN BEDAVA", "🍕 DİYET BOZULDU", "😴 UYKU MODU", "🤔 ACABA?", "🤷‍♂️ NASİP KISMET",
                "🔋 PİL BİTTİ", "🥳 PARTİ ZAMANI", "🤫 ÇAKTIRMA", "🌪️ ORTALIK KARIŞIK", "🫠 ERİDİM"
            ],
            emojiler: [
                "🌸", "🎀", "🩰", "🦢", "🕊️", "☁️", "☕️", "🧸", "✨", "🤍",
                "💌", "🪄", "🌷", "🍓", "🪴", "🌿", "🥂", "🎬", "🎨", "🎭",
                "💡", "💰", "💎", "🤝", "💪", "🌈", "🎉", "🍕", "💻", "✅"
            ]
        };

        // --- UYGULAMA MANTIĞI VE DURUMU ---
        const app = {
            state: {
                currentView: 'dashboard',
                selectedMonth: '',
                expandedId: null,
                activeMember: 'Beyza',
                isRecording: false,
                recordTime: 0,
                archive: {}
            },
            
            timers: {
                clock: null,
                record: null
            },

            init() {
                const today = new Date();
                this.state.selectedMonth = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, '0')}`;
                
                // Varsayılan Ay Verisi
                this.state.archive[this.state.selectedMonth] = this.createEmptyMonth();
                this.state.archive[this.state.selectedMonth].tasks.push({ id: Date.now(), text: 'Yeni ayı planla! ✨', description: 'Hedefleri belirle ve ekibe ata.', completed: false, priority: 'high', dueDate: this.state.selectedMonth + '-01' });
                this.state.archive[this.state.selectedMonth].teamTasks.Beyza.push({ id: 101, text: 'Tasarım trendlerini incele', description: '', completed: false });
                this.state.archive[this.state.selectedMonth].teamTasks.Zeliha.push({ id: 201, text: 'Ay sonu raporu hazırlığı', description: '', completed: false });
                this.state.archive[this.state.selectedMonth].teamTasks.Burak.push({ id: 301, text: 'Sistem kontrolü', description: '', completed: true });
                this.state.archive[this.state.selectedMonth].contentIdeas.push({ id: 401, text: 'Estetik ofis vlogu', description: 'Soft tonlarda çalışma ortamı videosu kurgulanacak.', completed: false });
                this.state.archive[this.state.selectedMonth].weeklyNotes.push({ id: 501, title: 'Haftalık Odak Noktası', content: 'Bu hafta müşteri memnuniyeti ve raporlama üzerine yoğunlaşacağız.' });
                this.state.archive[this.state.selectedMonth].adsData.push(
                    { id: 601, date: '12.04', spend: 450, reach: 12000, clicks: 340 },
                    { id: 602, date: '13.04', spend: 600, reach: 15500, clicks: 420 }
                );

                this.render();
                this.startClock();
            },

            createEmptyMonth() {
                return {
                    tasks: [], teamTasks: { Beyza: [], Zeliha: [], Burak: [] },
                    contentIdeas: [], weeklyNotes: [], adsData: [],
                    dashboardNotes: '', monthlyGoals: '', meetings: []
                };
            },

            getActiveData() {
                if (!this.state.archive[this.state.selectedMonth]) {
                    this.state.archive[this.state.selectedMonth] = this.createEmptyMonth();
                }
                return this.state.archive[this.state.selectedMonth];
            },

            formatTime(date) {
                return date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            },
            
            formatDateFull(date) {
                return new Intl.DateTimeFormat('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }).format(date);
            },

            getMonthName(monthKey) {
                const [year, month] = monthKey.split('-');
                return new Intl.DateTimeFormat('tr-TR', { month: 'long', year: 'numeric' }).format(new Date(year, month - 1));
            },

            formatRecordTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            },

            startClock() {
                this.timers.clock = setInterval(() => {
                    const el = document.getElementById('liveClock');
                    if (el) el.innerText = this.formatTime(new Date());
                }, 1000);
            },

            setView(view) {
                this.state.currentView = view;
                this.state.expandedId = null;
                this.render();
            },

            setExpandedId(id) {
                this.state.expandedId = this.state.expandedId === id ? null : id;
                this.render();
            },

            handleMonthChange(direction) {
                const [year, month] = this.state.selectedMonth.split('-').map(Number);
                let newDate;
                if (direction === 'next') newDate = new Date(year, month, 1);
                else newDate = new Date(year, month - 2, 1);
                
                this.state.selectedMonth = `${newDate.getFullYear()}-${(newDate.getMonth() + 1).toString().padStart(2, '0')}`;
                this.state.expandedId = null;
                this.render();
            },

            addTask() {
                const input = document.getElementById('newTaskInput');
                const priority = document.getElementById('newTaskPriority');
                const date = document.getElementById('newTaskDate');
                if (!input.value.trim()) return;
                const item = { id: Date.now(), text: input.value, description: '', completed: false, priority: priority.value, dueDate: date.value };
                this.getActiveData().tasks.unshift(item);
                this.render();
            },
            toggleTask(id) {
                const task = this.getActiveData().tasks.find(t => t.id === id);
                if(task) task.completed = !task.completed;
                this.render();
            },
            deleteTask(id) {
                this.getActiveData().tasks = this.getActiveData().tasks.filter(t => t.id !== id);
                this.render();
            },
            updateTaskDesc(id, val) {
                const task = this.getActiveData().tasks.find(t => t.id === id);
                if(task) task.description = val;
            },

            setActiveMember(member) {
                this.state.activeMember = member;
                this.state.expandedId = null;
                this.render();
            },
            addTeamTask() {
                const input = document.getElementById('newTeamTaskInput');
                if (!input.value.trim()) return;
                const item = { id: Date.now(), text: input.value, description: '', completed: false };
                this.getActiveData().teamTasks[this.state.activeMember].unshift(item);
                this.render();
            },
            toggleTeamTask(member, id) {
                const task = this.getActiveData().teamTasks[member].find(t => t.id === id);
                if(task) task.completed = !task.completed;
                this.render();
            },
            deleteTeamTask(member, id) {
                this.getActiveData().teamTasks[member] = this.getActiveData().teamTasks[member].filter(t => t.id !== id);
                this.render();
            },
            updateTeamTaskDesc(member, id, val) {
                const task = this.getActiveData().teamTasks[member].find(t => t.id === id);
                if(task) task.description = val;
            },

            addIdea() {
                const input = document.getElementById('newIdeaInput');
                if (!input.value.trim()) return;
                this.getActiveData().contentIdeas.unshift({ id: Date.now(), text: input.value, description: '', completed: false });
                this.render();
            },
            toggleIdea(id) {
                const idea = this.getActiveData().contentIdeas.find(i => i.id === id);
                if(idea) idea.completed = !idea.completed;
                this.render();
            },
            deleteIdea(id) {
                this.getActiveData().contentIdeas = this.getActiveData().contentIdeas.filter(i => i.id !== id);
                this.render();
            },
            updateIdeaDesc(id, val) {
                const idea = this.getActiveData().contentIdeas.find(i => i.id === id);
                if(idea) idea.description = val;
            },

            addWeeklyNote() {
                const input = document.getElementById('newNoteTitleInput');
                if (!input.value.trim()) return;
                this.getActiveData().weeklyNotes.unshift({ id: Date.now(), title: input.value, content: '' });
                this.render();
            },
            deleteWeeklyNote(id) {
                this.getActiveData().weeklyNotes = this.getActiveData().weeklyNotes.filter(n => n.id !== id);
                this.render();
            },
            updateWeeklyNoteContent(id, val) {
                const note = this.getActiveData().weeklyNotes.find(n => n.id === id);
                if(note) note.content = val;
            },

            updateMonthlyGoals(val) {
                this.getActiveData().monthlyGoals = val;
            },
            updateDashboardNotes(val) {
                this.getActiveData().dashboardNotes = val;
            },

            toggleRecord() {
                this.state.isRecording = !this.state.isRecording;
                if (this.state.isRecording) {
                    this.timers.record = setInterval(() => {
                        this.state.recordTime++;
                        const el = document.getElementById('recordTimerDisplay');
                        if (el) el.innerText = this.formatRecordTime(this.state.recordTime);
                    }, 1000);
                } else {
                    clearInterval(this.timers.record);
                    this.state.recordTime = 0;
                }
                this.render();
            },
            saveMeeting() {
                const title = document.getElementById('meetingTitleInput').value;
                const content = document.getElementById('meetingContentInput').value;
                if (!title.trim()) return;
                
                this.getActiveData().meetings.unshift({
                    id: Date.now(), title: title, date: new Date().toISOString().split('T')[0],
                    content: content, hasAudio: this.state.recordTime > 0
                });
                
                if(this.state.isRecording) this.toggleRecord();
                this.render();
            },

            addAdData() {
                const dDate = document.getElementById('adDate').value;
                const dSpend = document.getElementById('adSpend').value;
                const dReach = document.getElementById('adReach').value;
                const dClicks = document.getElementById('adClicks').value;

                if (!dDate || !dSpend) return;
                this.getActiveData().adsData.push({
                    id: Date.now(), date: dDate, spend: parseFloat(dSpend), 
                    reach: parseInt(dReach) || 0, clicks: parseInt(dClicks) || 0
                });
                this.getActiveData().adsData.sort((a,b) => a.date.localeCompare(b.date));
                this.render();
            },
            deleteAdData(id) {
                this.getActiveData().adsData = this.getActiveData().adsData.filter(d => d.id !== id);
                this.render();
            },

            copySticker(text) {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const toast = document.getElementById('copyFeedback');
                const toastText = document.getElementById('copyFeedbackText');
                toastText.innerText = `Kopyalandı: ${text}`;
                toast.classList.remove('opacity-0', 'pointer-events-none');
                
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none');
                }, 2000);
            },

            render() {
                const root = document.getElementById('app-root');
                root.innerHTML = `
                    ${this.getHTMLHeader()}
                    ${this.getHTMLView()}
                    ${this.getHTMLFooter()}
                `;
                lucide.createIcons();
            },

            getHTMLHeader() {
                const isDashboard = this.state.currentView === 'dashboard';
                const currentMKey = `${new Date().getFullYear()}-${(new Date().getMonth() + 1).toString().padStart(2, '0')}`;
                
                return `
                <header class="flex flex-col gap-6 mb-12">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-6 bg-white p-8 rounded-[3rem] shadow-xl border-2 border-pink-100">
                        <div class="flex items-center gap-5">
                            ${!isDashboard ? `<button onclick="app.setView('dashboard')" class="bg-stone-700 text-white p-4 rounded-2xl hover:scale-110 transition-transform"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>` : ''}
                            <div class="bg-gradient-to-tr from-pink-300 to-orange-200 p-4 rounded-[1.5rem] shadow-lg shadow-pink-100">
                                <i data-lucide="sparkles" class="text-white w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 class="text-4xl font-black text-stone-700 tracking-tighter uppercase leading-none">Notlarım</h1>
                                <span class="text-pink-400 text-xs font-black uppercase tracking-[0.3em]">${this.state.currentView} MODU</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-8 bg-stone-50 px-8 py-4 rounded-[2rem] border-2 border-stone-100">
                            <div class="text-center border-r-2 border-stone-200 pr-8">
                                <div class="text-stone-700 font-black text-3xl leading-none flex items-center gap-2">
                                    <i data-lucide="clock" class="text-pink-300 w-6 h-6"></i> <span id="liveClock">${this.formatTime(new Date())}</span>
                                </div>
                            </div>
                            <div class="text-left">
                                <div class="text-stone-400 text-xs font-black uppercase tracking-widest">${this.formatDateFull(new Date())}</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-wrap items-center justify-between bg-white px-8 py-5 rounded-[2.5rem] shadow-lg border-b-4 border-pink-200 gap-4">
                        <div class="flex items-center gap-4">
                            <i data-lucide="history" class="text-pink-300 w-6 h-6"></i>
                            <h3 class="text-sm font-black uppercase tracking-widest text-stone-400">Arşiv:</h3>
                        </div>
                        <div class="flex items-center gap-4 sm:gap-6">
                            <button onclick="app.handleMonthChange('prev')" class="bg-stone-50 p-3 rounded-xl hover:bg-pink-300 text-stone-500 hover:text-white transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <div class="text-lg sm:text-xl font-black text-stone-600 uppercase tracking-tighter px-4 sm:px-6 py-2 bg-pink-50 rounded-2xl border-2 border-pink-100 min-w-[150px] sm:min-w-[200px] text-center">
                                ${this.getMonthName(this.state.selectedMonth)}
                            </div>
                            <button onclick="app.handleMonthChange('next')" class="bg-stone-50 p-3 rounded-xl hover:bg-pink-300 text-stone-500 hover:text-white transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                        <div class="hidden lg:block text-xs font-black ${this.state.selectedMonth === currentMKey ? 'text-pink-400' : 'text-stone-400'} uppercase tracking-widest">
                            ${this.state.selectedMonth === currentMKey ? "● Aktif Dönem" : "○ Arşiv Kaydı"}
                        </div>
                    </div>
                </header>
                `;
            },

            getHTMLFooter() {
                return `
                <footer class="mt-20 mb-12 text-center opacity-40">
                    <div class="flex items-center justify-center gap-4">
                        <div class="h-px w-20 bg-stone-300"></div>
                        <p class="text-xs font-black uppercase tracking-[0.5em] text-stone-400">NOTLARIM NUDE SERİSİ • ${this.state.selectedMonth} ARŞİVİ</p>
                        <div class="h-px w-20 bg-stone-300"></div>
                    </div>
                </footer>
                `;
            },

            getHTMLView() {
                switch(this.state.currentView) {
                    case 'dashboard': return this.renderDashboard();
                    case 'daily': return this.renderDaily();
                    case 'team': return this.renderTeam();
                    case 'analytics': return this.renderAnalytics();
                    case 'ideas': return this.renderIdeas();
                    case 'weekly': return this.renderWeekly();
                    case 'monthly': return this.renderMonthly();
                    case 'meeting': return this.renderMeeting();
                    case 'stickers': return this.renderStickers();
                    default: return this.renderDashboard();
                }
            },

            renderDashboard() {
                const todayStr = new Date().toISOString().split('T')[0];
                const activeData = this.getActiveData();
                const reminders = activeData.tasks.filter(t => !t.completed && t.dueDate && t.dueDate <= todayStr);
                const hasHighPriority = activeData.tasks.some(t => !t.completed && t.priority === 'high');

                const cards = [
                    { id: 'daily', icon: 'list-todo', label: 'GÜNLÜK', colors: 'from-pink-300 to-orange-200' },
                    { id: 'weekly', icon: 'calendar', label: 'HAFTALIK', colors: 'from-orange-200 to-stone-200' },
                    { id: 'monthly', icon: 'calendar-days', label: 'AYLIK', colors: 'from-stone-300 to-stone-200' },
                    { id: 'meeting', icon: 'users', label: 'TOPLANTI', colors: 'from-pink-200 to-rose-200' },
                    { id: 'team', icon: 'user-plus', label: 'EKİP', colors: 'from-rose-400 to-pink-300' },
                    { id: 'ideas', icon: 'lightbulb', label: 'FİKİRLER', colors: 'from-amber-200 to-orange-300' },
                    { id: 'analytics', icon: 'trending-up', label: 'ANALİZ', colors: 'from-stone-400 to-rose-300' },
                    { id: 'stickers', icon: 'smile', label: 'STICKER', colors: 'from-pink-200 to-orange-200' }
                ];

                let cardsHTML = cards.map(c => `
                    <div onclick="app.setView('${c.id}')" class="group bg-gradient-to-br ${c.colors} p-5 rounded-[2rem] shadow-lg hover:scale-105 transition-all cursor-pointer relative overflow-hidden text-stone-800">
                        <div class="absolute -right-4 -top-4 opacity-15 group-hover:rotate-12 transition-transform"><i data-lucide="${c.icon}" class="w-16 h-16"></i></div>
                        <div class="bg-white/50 w-8 h-8 rounded-xl flex items-center justify-center mb-3"><i data-lucide="${c.icon}" class="w-4 h-4"></i></div>
                        <h2 class="text-[10px] font-black uppercase tracking-widest">${c.label}</h2>
                    </div>
                `).join('');

                let remindersHTML = reminders.length === 0 
                    ? `<p class="text-stone-400 font-bold italic">Her şey yolunda! 🌸</p>`
                    : reminders.map(r => `
                        <div class="bg-pink-50 p-6 rounded-3xl border-2 border-pink-100 flex justify-between items-center group">
                            <span class="font-black text-pink-400 truncate mr-4">${r.text}</span>
                            <span class="text-xs bg-pink-300 text-white px-3 py-1 rounded-full font-black uppercase whitespace-nowrap">ACİL</span>
                        </div>
                    `).join('');

                return `
                <div class="animate-zoom-in">
                    <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3">
                        ${cardsHTML}
                    </div>

                    <div class="mt-12 grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-stone-100 relative">
                            <div class="flex items-center gap-4 mb-8 text-stone-700">
                                <div class="bg-orange-100 p-3 rounded-2xl border-2 border-stone-100"><i data-lucide="bell" class="w-6 h-6 text-stone-500"></i></div>
                                <h3 class="text-2xl font-black uppercase tracking-tighter">Acil Radarı</h3>
                            </div>
                            <div class="space-y-4">
                                ${!hasHighPriority && reminders.length === 0 ? `<p class="text-stone-400 font-bold italic">Kritik iş yok! 🌸</p>` : remindersHTML}
                            </div>
                        </div>

                        <div class="bg-stone-700 p-10 rounded-[3rem] text-white relative overflow-hidden flex flex-col">
                            <i data-lucide="zap" class="absolute -right-10 -bottom-10 text-pink-200 opacity-20 rotate-12 w-[240px] h-[240px]"></i>
                            <div class="flex items-center justify-between mb-6 relative z-10">
                                <div class="flex items-center gap-3">
                                    <div class="bg-pink-200 p-2 rounded-xl border-2 border-stone-600"><i data-lucide="edit-3" class="text-stone-700 w-5 h-5"></i></div>
                                    <h3 class="text-2xl font-black uppercase tracking-tighter text-pink-200">Hızlı Not Defteri</h3>
                                </div>
                                <div class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 italic">Otomatik Kaydedilir</div>
                            </div>
                            
                            <textarea
                                oninput="app.updateDashboardNotes(this.value)"
                                placeholder="Buraya o anki ay için genel stratejilerini karalayabilirsin..."
                                class="flex-1 w-full bg-white/5 border-2 border-stone-500 rounded-[2rem] p-6 text-xl font-bold leading-relaxed outline-none focus:border-pink-300 transition-all resize-none placeholder:text-stone-400 relative z-10 shadow-inner text-white"
                            >${activeData.dashboardNotes}</textarea>
                        </div>
                    </div>
                </div>
                `;
            },

            renderDaily() {
                const activeData = this.getActiveData();

                                ` : ''}
                            </div>
                            <div class="bg-stone-50 p-6 sm:p-8 rounded-[3rem] border-4 border-stone-100 flex flex-col gap-4 relative z-10">
                                <input type="text" id="meetingTitleInput" placeholder="TOPLANTI BAŞLIĞI" class="w-full bg-transparent text-2xl sm:text-3xl font-black text-pink-400 uppercase outline-none placeholder:text-pink-200" />
                                <textarea id="meetingContentInput" class="w-full h-64 sm:h-80 bg-white p-6 sm:p-8 rounded-[2rem] text-lg sm:text-xl font-bold text-stone-600 outline-none border-2 border-transparent focus:border-pink-200 shadow-inner resize-none" placeholder="Hızlı notlarını buraya ateşle..."></textarea>
                                <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center mt-4 gap-4">
                                    <button onclick="app.toggleRecord()" class="flex justify-center items-center gap-3 px-8 py-4 sm:py-5 rounded-[2rem] font-black uppercase shadow-2xl transition-all w-full sm:w-auto ${this.state.isRecording ? 'bg-pink-400 text-white' : 'bg-stone-700 text-white hover:bg-stone-800'}">
                                        ${this.state.isRecording ? `<i data-lucide="square" class="w-6 h-6"></i> Durdur` : `<i data-lucide="mic" class="w-6 h-6"></i> Kaydı Başlat`}
                                    </button>
                                    <button onclick="app.saveMeeting()" class="bg-pink-300 text-white px-10 py-4 sm:py-5 rounded-[2rem] font-black uppercase shadow-xl hover:bg-pink-400 transition-all w-full sm:w-auto">KAYDET</button>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <h3 class="text-2xl font-black uppercase text-stone-400">ARŞİV</h3>
                            <div class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                                ${archiveHTML.length > 0 ? archiveHTML : `<p class="text-stone-400 italic font-bold">Henüz kaydedilmiş bir toplantı yok.</p>`}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            },

            renderStickers() {
                let categoriesHTML = Object.entries(stickersData).map(([category, items]) => `
                    <div>
                        <h3 class="text-2xl font-black uppercase text-pink-400 mb-8 border-b-4 border-pink-100 pb-4 inline-block">
                            ${category === 'is_dunyasi' ? 'İŞ DÜNYASI' : category.toUpperCase()}
                        </h3>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">
                            ${items.map(item => `
                                <button onclick="app.copySticker('${item}')" class="bg-stone-50 border-4 border-stone-100 p-6 rounded-[2rem] text-center font-black hover:bg-white hover:border-pink-200 hover:scale-110 hover:-rotate-3 transition-all group relative ${category === 'emojiler' ? 'text-3xl' : 'text-base text-stone-600'}">
                                    <span class="block group-hover:scale-110 transition-transform">${item}</span>
                                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-pink-400 transition-opacity"><i data-lucide="copy" class="w-4 h-4"></i></div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                return `
                <div class="animate-slide-in-bottom bg-white p-6 sm:p-10 rounded-[4rem] shadow-2xl border-4 border-orange-100 min-h-[700px]">
                    <div class="flex items-center gap-4 mb-10">
                        <div class="bg-gradient-to-tr from-orange-200 to-pink-300 p-4 rounded-3xl text-white shadow-lg"><i data-lucide="smile" class="w-8 h-8"></i></div>
                        <h2 class="text-3xl sm:text-4xl font-black text-stone-700 uppercase tracking-tighter">STICKER & EMOJI</h2>
                    </div>
                    <p class="text-stone-400 font-bold mb-12 uppercase tracking-widest text-sm">İstediğine tıkla, kopyala ve dilediğin yere yapıştır! 🎨</p>
                    <div class="space-y-16">
                        ${categoriesHTML}
                    </div>
                </div>
                `;
            }
        };

        // Uygulamayı Başlat
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
