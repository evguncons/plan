<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notlarım - Akıllı Asistan PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #fdfafb;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(228, 196, 204, 0.15) 15px, rgba(228, 196, 204, 0.15) 16px),
                repeating-linear-gradient(-45deg, transparent, transparent 15px, rgba(228, 196, 204, 0.15) 15px, rgba(228, 196, 204, 0.15) 16px);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            color: #292524;
            scroll-behavior: smooth;
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .view-anim { animation: zoomIn 0.3s ease-out forwards; }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #eecfd8; border-radius: 10px; }
        
        input, textarea, select { transition: all 0.2s ease; border-width: 2px; border-color: transparent; }
        input:focus, textarea:focus { border-color: #f43f5e !important; outline: none; box-shadow: 0 0 15px rgba(244, 63, 94, 0.1); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .mobile-grid { grid-template-cols: 1fr !important; }
            .mobile-header { flex-direction: column; align-items: flex-start !important; }
        }
    </style>
</head>
<body class="min-h-screen p-3 sm:p-4 md:p-8">

    <div id="loading" class="loading-overlay hidden">
        <div class="flex flex-col items-center gap-3">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-rose-400 border-t-transparent"></div>
            <p class="font-bold text-rose-500 uppercase text-[10px] tracking-[0.3em]">Bulutla Eşleşiyor...</p>
        </div>
    </div>

    <div id="app-root" class="max-w-7xl mx-auto"></div>

    <div id="copyFeedback" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-stone-800 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-4 border-2 border-rose-300 opacity-0 pointer-events-none transition-all duration-300">
        <i data-lucide="check" class="text-rose-300 w-6 h-6"></i>
        <span id="copyFeedbackText" class="font-black uppercase tracking-widest text-sm">Kaydedildi!</span>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgbQP7Cy_1juLVyayYn_9qHCVY3vDnaLFNdnGWUAjMe-zSaPY3Ws4M4wcVBBWxgT636A/exec";

        const stickersData = {
            motivasyon: ["🔥 YAPABİLİRSİN!", "🚀 UÇUŞA GEÇ", "⭐️ GÜNÜN YILDIZI", "🌈 PES ETME", "💪 ŞAMPİYON", "✨ PARLA!", "⚡️ FULL ENERJİ", "🎯 ODAKLAN", "💎 DEĞERLİSİN"],
            is: ["💼 TOPLANTIDA", "⏳ DEADLINE!", "☕️ KAHVE MOLASI", "✅ ONAYLANDI", "📊 VERİ ANALİZİ", "🚀 LANSMAN", "💡 FİKİR!"],
            emoji: ["😀", "😂", "🥰", "😎", "🤩", "🥳", "🤯", "🚀", "🔥", "⚡️", "✨", "🌟", "💯", "✅", "💡", "💰", "💎", "🤝", "💪", "🎉"]
        };

        // window.app üzerinden her yerden erişilebilir kılıyoruz
        window.app = {
            state: {
                currentView: 'dashboard',
                selectedMonth: '',
                activeMember: 'Beyza',
                archive: {},
                isSyncing: false,
                editMeetingId: null,
                isInitial: true
            },
            
            timers: { clock: null, sync: null, autoRefresh: null },

            async init() {
                const today = new Date();
                this.state.selectedMonth = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, '0')}`;
                
                const saved = localStorage.getItem('notlarim_pro_v6');
                if (saved) this.state.archive = JSON.parse(saved);

                this.render();
                this.startClock();
                
                await this.loadFromSheets(saved ? true : false);

                this.timers.autoRefresh = setInterval(() => {
                    const active = document.activeElement;
                    if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA') {
                        this.loadFromSheets(true); 
                    }
                }, 5000);
            },

            async loadFromSheets(silent = false) {
                if (this.state.isSyncing) return;
                if (!silent) this.setLoading(true);
                try {
                    const res = await fetch(`${APPS_SCRIPT_URL}?action=load&monthKey=${this.state.selectedMonth}&t=${Date.now()}`);
                    const sheetsData = await res.json();
                    
                    if (sheetsData && !sheetsData.status) {
                        const currentStr = JSON.stringify(this.state.archive[this.state.selectedMonth] || {});
                        const newStr = JSON.stringify(sheetsData);
                        
                        if (currentStr !== newStr) {
                            this.state.archive[this.state.selectedMonth] = sheetsData;
                            localStorage.setItem('notlarim_pro_v6', JSON.stringify(this.state.archive));
                            this.render(false);
                        }
                    }
                } catch (e) { console.error("Cloud Error:", e); }
                this.setLoading(false);
                this.state.isInitial = false;
            },

            setLoading(val) {
                const el = document.getElementById('loading');
                if (val) el?.classList.remove('hidden');
                else el?.classList.add('hidden');
            },

            getActiveData() {
                if (!this.state.archive[this.state.selectedMonth]) {
                    this.state.archive[this.state.selectedMonth] = { tasks: [], teamTasks: { Beyza: [], Zeliha: [], Burak: [] }, contentIdeas: [], weeklyNotes: [], adsData: [], dashboardNotes: '', monthlyGoals: '', meetings: [] };
                }
                return this.state.archive[this.state.selectedMonth];
            },

            saveData(reRender = true) {
                localStorage.setItem('notlarim_pro_v6', JSON.stringify(this.state.archive));
                if (reRender) this.render(false);
                
                if (this.timers.sync) clearTimeout(this.timers.sync);
                this.timers.sync = setTimeout(() => {
                    this.state.isSyncing = true;
                    fetch(APPS_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ monthKey: this.state.selectedMonth, data: this.getActiveData() })
                    }).then(() => {
                        this.state.isSyncing = false;
                        console.log("Sheets sync success.");
                    });
                }, 1000);
            },

            showToast(msg) {
                const toast = document.getElementById('copyFeedback');
                const toastText = document.getElementById('copyFeedbackText');
                if(!toast) return;
                toastText.innerText = msg;
                toast.style.opacity = '1';
                toast.style.pointerEvents = 'auto';
                setTimeout(() => { toast.style.opacity = '0'; toast.style.pointerEvents = 'none'; }, 2000);
            },

            startClock() {
                setInterval(() => {
                    const el = document.getElementById('liveClock');
                    if (el) el.innerText = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                }, 1000);
            },

            // --- NAVIGATION ---
            setView(v) { 
                this.state.currentView = v; 
                this.state.editMeetingId = null; 
                this.render(true); 
            },

            async handleMonthChange(dir) {
                const parts = this.state.selectedMonth.split('-');
                let y = parseInt(parts[0]), m = parseInt(parts[1]);
                if (dir === 'next') { m++; if(m>12){m=1;y++;} }
                else { m--; if(m<1){m=12;y--;} }
                this.state.selectedMonth = `${y}-${m.toString().padStart(2, '0')}`;
                this.render(true);
                await this.loadFromSheets();
            },

            // --- COMPONENT ACTIONS ---
            addTask() {
                const input = document.getElementById('newTaskInput');
                if(!input || !input.value.trim()) return;
                this.getActiveData().tasks.unshift({ id: Date.now(), text: input.value, completed: false, priority: document.getElementById('newTaskPriority').value, dueDate: document.getElementById('newTaskDate').value });
                this.saveData(); input.value = '';
            },
            toggleTask(id) { const t = this.getActiveData().tasks.find(x => x.id == id); if(t) t.completed = !t.completed; this.saveData(); },
            deleteTask(id) { this.getActiveData().tasks = this.getActiveData().tasks.filter(x => x.id != id); this.saveData(); },

            setActiveMember(m) { 
                this.state.activeMember = m; 
                this.render(false); // Render without zoom animation for smooth transition
            },
            addTeamTask() {
                const input = document.getElementById('newTeamTaskInput');
                if(!input || !input.value.trim()) return;
                this.getActiveData().teamTasks[this.state.activeMember].unshift({ id: Date.now(), text: input.value, completed: false });
                this.saveData(); input.value = '';
            },
            toggleTeamTask(id) { const t = this.getActiveData().teamTasks[this.state.activeMember].find(x => x.id == id); if(t) t.completed = !t.completed; this.saveData(); },
            deleteTeamTask(id) { this.getActiveData().teamTasks[this.state.activeMember] = this.getActiveData().teamTasks[this.state.activeMember].filter(x => x.id != id); this.saveData(); },

            addIdea() {
                const input = document.getElementById('newIdeaInput');
                if(!input || !input.value.trim()) return;
                this.getActiveData().contentIdeas.unshift({ id: Date.now(), text: input.value, completed: false });
                this.saveData(); input.value = '';
            },
            toggleIdea(id) { const i = this.getActiveData().contentIdeas.find(x => x.id == id); if(i) i.completed = !i.completed; this.saveData(); },
            deleteIdea(id) { this.getActiveData().contentIdeas = this.getActiveData().contentIdeas.filter(x => x.id != id); this.saveData(); },

            addWeeklyNote() {
                const input = document.getElementById('newNoteTitleInput');
                if(!input || !input.value.trim()) return;
                this.getActiveData().weeklyNotes.unshift({ id: Date.now(), title: input.value, content: '' });
                this.saveData(); input.value = '';
            },
            updateWeeklyNote(id, val) { const n = this.getActiveData().weeklyNotes.find(x => x.id == id); if(n) n.content = val; },
            deleteWeeklyNote(id) { this.getActiveData().weeklyNotes = this.getActiveData().weeklyNotes.filter(x => x.id != id); this.saveData(); },

            addAdData() {
                const d = document.getElementById('adDate').value;
                const s = document.getElementById('adSpend').value;
                if(!d || !s) return;
                this.getActiveData().adsData.push({ id: Date.now(), date: d, spend: parseFloat(s), reach: parseInt(document.getElementById('adReach').value)||0, clicks: parseInt(document.getElementById('adClicks').value)||0 });
                this.getActiveData().adsData.sort((a,b)=>a.date.localeCompare(b.date));
                this.saveData();
            },
            deleteAdData(id) { this.getActiveData().adsData = this.getActiveData().adsData.filter(x => x.id != id); this.saveData(); },

            // MEETING ACTIONS
            editMeeting(id) {
                const m = this.getActiveData().meetings.find(x => x.id == id);
                if (!m) return;
                this.state.editMeetingId = m.id;
                this.render(false);
                document.getElementById('meetingTitleInput').value = m.title;
                document.getElementById('meetingContentInput').value = m.content || '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.showToast('Düzenleme Aktif');
            },
            saveMeeting() {
                const title = document.getElementById('meetingTitleInput').value.trim() || "Yeni Toplantı";
                const content = document.getElementById('meetingContentInput').value.trim();
                const data = this.getActiveData();

                if (this.state.editMeetingId) {
                    const idx = data.meetings.findIndex(x => x.id == this.state.editMeetingId);
                    if (idx > -1) data.meetings[idx] = { ...data.meetings[idx], title, content };
                    this.state.editMeetingId = null;
                } else {
                    data.meetings.unshift({ id: Date.now(), title, date: new Intl.DateTimeFormat('tr-TR').format(new Date()), content });
                }
                this.saveData();
                this.showToast('Kaydedildi!');
            },

            copySticker(text) {
                const el = document.createElement('textarea');
                el.value = text; document.body.appendChild(el);
                el.select(); 
                document.execCommand('copy');
                document.body.removeChild(el);
                this.showToast(`Kopyalandı: ${text}`);
            },

            // --- RENDERING ---
            render(withAnim = false) {
                const root = document.getElementById('app-root');
                if(!root) return;
                root.innerHTML = `
                    ${this.getHTMLHeader()}
                    <div class="${withAnim ? 'view-anim' : ''}">${this.getHTMLView()}</div>
                    ${this.getHTMLFooter()}
                `;
                lucide.createIcons();
            },

            getHTMLHeader() {
                const isDashboard = this.state.currentView === 'dashboard';
                const parts = this.state.selectedMonth.split('-');
                const monthName = new Intl.DateTimeFormat('tr-TR', { month: 'long', year: 'numeric' }).format(new Date(parts[0], parts[1]-1));
                return `
                <header class="mb-6">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-4 bg-white p-5 rounded-[2rem] shadow-xl border-2 border-stone-100 text-stone-800">
                        <div class="flex items-center gap-3">
                            ${!isDashboard ? `<button onclick="app.setView('dashboard')" class="bg-stone-800 text-white p-2 rounded-lg hover:scale-110 transition-all shadow-lg"><i data-lucide="arrow-left"></i></button>` : ''}
                            <div class="bg-rose-400 p-3 rounded-xl shadow-lg text-white"><i data-lucide="sparkles" class="w-5 h-5"></i></div>
                            <div><h1 class="text-xl sm:text-2xl font-black uppercase leading-none tracking-tighter">Notlarım</h1><span class="text-rose-400 text-[8px] font-black uppercase tracking-[0.4em]">${this.state.currentView}</span></div>
                        </div>
                        <div class="flex items-center gap-4 bg-stone-50 px-4 py-2 rounded-xl border-2 border-stone-200">
                            <div class="font-black text-xl flex items-center gap-2"><i data-lucide="clock" class="text-rose-400 w-4 h-4"></i><span id="liveClock">--:--</span></div>
                        </div>
                    </div>
                    <div class="mt-3 flex flex-col sm:flex-row items-center justify-between bg-white px-5 py-3 rounded-[1.5rem] shadow-md border-b-4 border-rose-200 gap-3">
                        <div class="flex items-center gap-2 text-stone-400"><i data-lucide="calendar" class="w-4 h-4"></i><span class="text-[9px] font-black uppercase tracking-widest">Seçili Dönem:</span></div>
                        <div class="flex items-center gap-3">
                            <button onclick="app.handleMonthChange('prev')" class="bg-stone-100 p-1.5 rounded-md hover:bg-rose-50"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <div class="text-sm font-black text-stone-700 min-w-[120px] text-center uppercase">${monthName}</div>
                            <button onclick="app.handleMonthChange('next')" class="bg-stone-100 p-1.5 rounded-md hover:bg-rose-50"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </header>`;
            },

            getHTMLFooter() { return `<footer class="mt-8 text-center opacity-20 font-black text-[8px] uppercase tracking-[0.5em]">PRO NUDE SERIES • ${this.state.selectedMonth}</footer>`; },

            getHTMLView() {
                const data = this.getActiveData();
                const todayStr = new Date().toISOString().split('T')[0];

                if (this.state.currentView === 'dashboard') {
                    const urgents = data.tasks.filter(t => !t.completed && (t.priority === 'high' || (t.dueDate && t.dueDate <= todayStr)));
                    const cards = [
                        { id: 'daily', icon: 'list-todo', label: 'GÜNLÜK', colors: 'from-rose-300 to-orange-200' },
                        { id: 'weekly', icon: 'calendar', label: 'HAFTALIK', colors: 'from-orange-200 to-amber-200' },
                        { id: 'monthly', icon: 'calendar-days', label: 'AYLIK', colors: 'from-stone-300 to-stone-200' },
                        { id: 'meeting', icon: 'users', label: 'TOPLANTI', colors: 'from-pink-300 to-rose-200' },
                        { id: 'team', icon: 'user-plus', label: 'EKİP', colors: 'from-rose-400 to-pink-300' },
                        { id: 'ideas', icon: 'lightbulb', label: 'FİKİRLER', colors: 'from-amber-200 to-orange-300' },
                        { id: 'analytics', icon: 'trending-up', label: 'ANALİZ', colors: 'from-stone-400 to-rose-300' },
                        { id: 'stickers', icon: 'smile', label: 'STICKER', colors: 'from-pink-200 to-orange-200' }
                    ];

                    return `
                    <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-2">
                        ${cards.map(c => `<div onclick="app.setView('${c.id}')" class="group bg-gradient-to-br ${c.colors} p-4 rounded-[1.5rem] shadow hover:scale-105 cursor-pointer relative overflow-hidden text-stone-800 transition-all"><i data-lucide="${c.icon}" class="w-10 h-10 absolute -right-2 -top-2 opacity-10"></i><div class="bg-white/30 w-7 h-7 rounded-lg flex items-center justify-center mb-1"><i data-lucide="${c.icon}" class="w-4 h-4"></i></div><h2 class="text-[9px] font-black uppercase">${c.label}</h2></div>`).join('')}
                    </div>
                    <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-[2rem] shadow-xl border-4 border-stone-800 h-fit">
                            <h3 class="text-lg font-black text-stone-800 mb-4 uppercase tracking-tighter flex items-center gap-2"><i data-lucide="bell" class="text-rose-400 w-5 h-5"></i> Acil Radarı</h3>
                            <div class="space-y-2 max-h-[220px] overflow-y-auto pr-1">
                                ${urgents.length === 0 ? '<p class="text-stone-300 italic text-xs">🕊️ Her şey yolunda.</p>' : urgents.map(r => `<div class="bg-rose-50 p-3 rounded-xl border-2 border-rose-100 flex justify-between items-center"><span class="font-bold text-xs text-stone-700">${r.text}</span><span class="bg-rose-500 text-white px-2 py-0.5 rounded text-[7px] font-black uppercase tracking-widest">ACİL</span></div>`).join('')}
                            </div>
                        </div>
                        <div class="bg-stone-800 p-6 rounded-[2rem] text-white relative flex flex-col">
                            <h3 class="text-lg font-black text-rose-300 mb-4 uppercase tracking-tighter">Hızlı Not Defteri</h3>
                            <textarea id="dashboardNotesInput" oninput="app.getActiveData().dashboardNotes = this.value; app.saveData(false);" class="w-full bg-white/5 border-2 border-stone-600 rounded-[1.5rem] p-4 text-sm min-h-[180px] outline-none text-white shadow-inner" placeholder="Anlık stratejileri buraya yaz...">${data.dashboardNotes || ''}</textarea>
                            <div class="mt-3 flex justify-end"><button onclick="app.saveData(); app.showToast('Senkronize Edildi!');" class="bg-rose-400 text-white px-5 py-1.5 rounded-lg font-black text-[10px] hover:bg-rose-500 shadow-lg">KAYDET</button></div>
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'daily') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2rem] sm:rounded-[3rem] shadow-2xl border-4 border-rose-100 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter">GÜNLÜK PLAN</h2>
                        <div class="flex flex-col md:flex-row gap-3 mb-6 bg-rose-50 p-4 rounded-2xl border-2 border-rose-100 shadow-inner">
                            <input type="text" id="newTaskInput" placeholder="Ne yapıyoruz?" class="flex-1 p-3 rounded-xl font-bold text-sm" />
                            <div class="flex gap-2">
                                <select id="newTaskPriority" class="flex-1 p-3 rounded-xl font-black text-rose-500 bg-white text-xs"><option value="high">🔥 YÜKSEK</option><option value="medium" selected>⚡ ORTA</option><option value="low">☘️ DÜŞÜK</option></select>
                                <input type="date" id="newTaskDate" value="${todayStr}" class="flex-1 p-3 rounded-xl font-bold text-stone-500 bg-white text-xs" />
                            </div>
                            <button onclick="app.addTask()" class="w-full md:w-auto bg-rose-400 text-white p-3 px-8 rounded-xl hover:bg-rose-500 shadow-lg font-black uppercase text-xs">EKLE</button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${data.tasks.map(t => `<div class="p-4 rounded-xl border-2 flex items-center gap-3 transition-all ${t.completed ? 'opacity-40 grayscale bg-stone-50' : 'bg-white border-rose-50 shadow-sm'} card-hover"><button onclick="app.toggleTask(${t.id})">${t.completed ? '<i data-lucide="check-circle-2" class="text-rose-400"></i>' : '<i data-lucide="circle" class="text-stone-200"></i>'}</button><span class="flex-1 font-bold ${t.completed ? 'line-through text-stone-400 italic' : ''}">${t.text}</span><button onclick="app.deleteTask(${t.id})" class="text-stone-200 hover:text-rose-400 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button></div>`).join('')}</div>
                    </div>`;
                }

                if (this.state.currentView === 'team') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2rem] sm:rounded-[3rem] shadow-2xl border-4 border-pink-100 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter">EKİP YÖNETİMİ</h2>
                        <div class="flex gap-2 mb-6 bg-stone-50 p-2 rounded-2xl w-fit border-2 border-stone-100">
                            ${['Beyza', 'Zeliha', 'Burak'].map(m => `<button onclick="app.setActiveMember('${m}')" class="px-5 py-2 rounded-xl font-black uppercase text-[9px] tracking-widest ${this.state.activeMember === m ? 'bg-pink-400 text-white shadow-lg scale-105' : 'text-stone-400 bg-white'} transition-all">${m}</button>`).join('')}
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-stone-50 p-5 rounded-2xl border-2 border-stone-100 h-fit shadow-inner">
                                <h3 class="font-black text-pink-500 mb-3 text-[10px] uppercase tracking-widest">GÖREV ATA: ${this.state.activeMember.toUpperCase()}</h3>
                                <input type="text" id="newTeamTaskInput" placeholder="Görev metni..." class="w-full p-4 rounded-xl outline-none font-bold text-sm mb-3" />
                                <button onclick="app.addTeamTask()" class="w-full bg-pink-400 text-white py-2.5 rounded-xl font-black uppercase text-[10px] shadow-md hover:bg-pink-500">EKLE</button>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-black text-stone-300 text-[10px] uppercase mb-2">GÜNCEL LİSTE</h3>
                                ${data.teamTasks[this.state.activeMember].map(t => `<div class="p-3 bg-white border-2 border-pink-50 rounded-xl flex items-center gap-3 text-xs font-bold shadow-sm"><button onclick="app.toggleTeamTask(${t.id})">${t.completed ? '<i data-lucide="check-circle-2" class="text-emerald-400 w-6 h-6"></i>' : '<i data-lucide="circle" class="text-stone-200 w-6 h-6"></i>'}</button><span class="flex-1 ${t.completed ? 'line-through text-stone-300 italic' : ''}">${t.text}</span><button onclick="app.deleteTeamTask(${t.id})"><i data-lucide="trash-2" class="w-4 h-4 text-stone-200 hover:text-rose-400"></i></button></div>`).join('')}
                            </div>
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'analytics') {
                    const maxS = Math.max(...data.adsData.map(d=>d.spend), 1);
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] shadow-2xl border-4 border-stone-200 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter">REKLAM ANALİZİ</h2>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="bg-stone-50 p-5 rounded-2xl space-y-2 h-fit border-2 border-stone-100 shadow-inner">
                                <input type="text" id="adDate" placeholder="Tarih (Örn: 14.04)" class="w-full p-3 rounded-lg text-sm font-bold" />
                                <input type="number" id="adSpend" placeholder="Harcama (TL)" class="w-full p-3 rounded-lg text-sm font-bold" />
                                <input type="number" id="adReach" placeholder="Erişim" class="w-full p-3 rounded-lg text-sm font-bold" />
                                <input type="number" id="adClicks" placeholder="Tıklama" class="w-full p-3 rounded-lg text-sm font-bold" />
                                <button onclick="app.addAdData()" class="w-full bg-stone-800 text-white py-3 rounded-lg font-black uppercase text-[10px] tracking-widest">GRAFİĞE EKLE</button>
                            </div>
                            <div class="lg:col-span-2 bg-stone-800 p-8 rounded-[2rem] flex flex-col min-h-[350px] relative overflow-hidden">
                                <h3 class="text-rose-300 font-black text-[10px] uppercase mb-10 tracking-widest text-center">Bütçe Performans Grafiği</h3>
                                <div class="flex-1 flex items-end gap-1.5 border-b border-stone-700 pb-3 overflow-x-auto min-h-[180px]">
                                    ${data.adsData.map(d => `<div class="flex-1 bg-gradient-to-t from-stone-400 to-rose-300 rounded-t-sm min-w-[20px] hover:scale-110 transition-transform cursor-help relative group" style="height: ${(d.spend/maxS)*150}px" title="${d.spend} TL">
                                        <div class="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 bg-white text-stone-800 text-[8px] p-2 rounded shadow-xl opacity-0 group-hover:opacity-100 whitespace-nowrap pointer-events-none font-bold z-10 border border-rose-100">${d.date}: ${d.spend} TL</div>
                                    </div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'ideas') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] shadow-2xl border-4 border-orange-100 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter text-center">İÇERİK FİKİRLERİ</h2>
                        <div class="bg-orange-50 p-4 sm:p-6 rounded-2xl flex flex-col sm:flex-row gap-3 mb-6 border-2 border-orange-100 shadow-inner">
                            <input type="text" id="newIdeaInput" placeholder="Aklına ne geldi?.." class="flex-1 p-3 rounded-xl font-bold text-sm" />
                            <button onclick="app.addIdea()" class="bg-orange-400 text-white px-8 py-3 rounded-xl font-black text-xs">EKLE</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${data.contentIdeas.map(i => `<div class="p-4 bg-white border-2 border-orange-50 rounded-xl flex items-center gap-3 shadow-sm card-hover"><button onclick="app.toggleIdea(${i.id})">${i.completed ? '<i data-lucide="check-circle-2" class="text-orange-400 w-6 h-6"></i>' : '<i data-lucide="circle" class="text-stone-200 w-6 h-6"></i>'}</button><span class="flex-1 font-bold text-xs ${i.completed ? 'line-through text-stone-300 italic' : ''}">${i.text}</span><button onclick="app.deleteIdea(${i.id})"><i data-lucide="trash-2" class="text-stone-200 hover:text-rose-400 w-5 h-5"></i></button></div>`).join('')}
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'weekly') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] shadow-2xl border-4 border-emerald-100 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter text-center">HAFTALIK KONULAR</h2>
                        <div class="bg-emerald-50 p-5 rounded-2xl flex flex-col sm:flex-row gap-3 mb-6 border-2 border-emerald-100">
                            <input type="text" id="newNoteTitleInput" placeholder="Haftalık başlık..." class="flex-1 p-3 rounded-xl font-bold text-sm" />
                            <button onclick="app.addWeeklyNote()" class="bg-emerald-400 text-white px-8 py-3 rounded-xl font-black text-xs">BAŞLIK EKLE</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${data.weeklyNotes.map(n => `<div class="p-5 bg-stone-50 rounded-2xl border-2 border-emerald-50 shadow-sm relative"><div class="flex justify-between mb-2"><h3 class="font-black text-stone-800 uppercase text-sm">${n.title}</h3><button onclick="app.deleteWeeklyNote(${n.id})" class="text-stone-200 hover:text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div><textarea oninput="app.updateWeeklyNote(${n.id}, this.value)" class="w-full bg-white p-3 rounded-xl border-2 border-transparent shadow-inner h-24 text-sm text-stone-700 font-bold" placeholder="Ayrıntıları doldur...">${n.content || ''}</textarea><div class="flex justify-end mt-2"><button onclick="app.saveData(); app.showToast('Kaydedildi!');" class="bg-emerald-400 text-white px-4 py-1.5 rounded-lg text-[9px] font-black uppercase shadow-md hover:bg-emerald-500">DEĞİŞİKLİĞİ KAYDET</button></div></div>`).join('')}
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'monthly') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] shadow-2xl border-4 border-stone-200 min-h-[500px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter">AYLIK VİZYON</h2>
                        <div class="relative"><textarea id="monthlyGoalsInput" oninput="app.getActiveData().monthlyGoals = this.value; app.saveData(false);" class="w-full h-[400px] bg-stone-50 p-6 rounded-[2rem] border-4 border-stone-100 outline-none font-bold text-lg text-stone-700 shadow-inner resize-none focus:border-rose-200" placeholder="Büyük vizyonunu buraya dök...">${data.monthlyGoals || ''}</textarea><button onclick="app.saveData(); app.showToast('Vizyon Kaydedildi!');" class="absolute bottom-6 right-6 bg-stone-800 text-white px-6 py-2.5 rounded-xl font-black uppercase text-[10px] shadow-xl hover:bg-stone-700 transition-all">KAYDET</button></div>
                    </div>`;
                }

                if (this.state.currentView === 'meeting') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] border-4 border-pink-100 shadow-2xl min-h-[600px]">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase tracking-tighter">TOPLANTI ODASI</h2>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 space-y-4">
                                <input id="meetingTitleInput" type="text" placeholder="Toplantı Başlığı..." class="w-full text-xl font-black text-rose-400 outline-none bg-transparent border-b-2 border-rose-100 focus:border-rose-400 transition-all pb-2" />
                                <textarea id="meetingContentInput" class="w-full h-64 bg-stone-50 border-2 border-stone-100 p-5 rounded-[1.5rem] outline-none font-bold text-stone-700 shadow-inner resize-none focus:border-rose-200 text-sm" placeholder="Toplantı notları..."></textarea>
                                <div class="flex gap-3">
                                    <button onclick="app.saveMeeting()" class="flex-1 bg-rose-400 text-white py-4 rounded-xl font-black uppercase shadow-lg hover:bg-rose-500 text-sm">
                                        ${this.state.editMeetingId ? 'GÜNCELLE' : 'ARŞİVE EKLE'}
                                    </button>
                                    ${this.state.editMeetingId ? `<button onclick="app.setView('meeting')" class="px-4 bg-stone-100 text-stone-400 font-bold text-[10px] uppercase rounded-xl">İPTAL</button>` : ''}
                                </div>
                            </div>
                            <div class="space-y-3">
                                <h3 class="text-[9px] font-black text-stone-300 uppercase tracking-widest mb-2">GEÇMİŞ TOPLANTILAR</h3>
                                <div class="max-h-[350px] overflow-y-auto pr-1 space-y-2 text-stone-800">
                                    ${data.meetings.length === 0 ? '<p class="text-stone-300 italic text-[10px]">Kayıt yok.</p>' : data.meetings.map(m => `
                                        <div onclick='app.editMeeting(${m.id})' class="p-4 bg-pink-50 rounded-xl border-2 ${this.state.editMeetingId == m.id ? 'border-rose-400 scale-[1.02]' : 'border-pink-100'} hover:border-rose-300 cursor-pointer shadow-sm group transition-all">
                                            <div class="flex justify-between items-center mb-1"><div class="text-[7px] font-black text-rose-300 uppercase">${m.date}</div><i data-lucide="edit-2" class="w-3 h-3 text-rose-300 opacity-0 group-hover:opacity-100"></i></div>
                                            <h4 class="font-black text-xs leading-tight">${m.title}</h4>
                                            <div class="mt-1 text-[8px] text-stone-400 line-clamp-1 italic">${m.content || '...'}</div>
                                        </div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                if (this.state.currentView === 'stickers') {
                    return `
                    <div class="bg-white p-5 sm:p-8 rounded-[2.5rem] border-4 border-pink-100 shadow-2xl">
                        <h2 class="text-xl sm:text-2xl font-black text-stone-800 mb-6 uppercase text-center tracking-tighter">STICKER & EMOJI</h2>
                        <div class="space-y-6">
                            ${Object.entries(stickersData).map(([cat, items]) => `
                                <div class="bg-stone-50 p-4 sm:p-6 rounded-2xl border-2 border-stone-100 shadow-sm">
                                    <h3 class="text-[8px] font-black text-rose-400 mb-4 uppercase tracking-[0.3em] bg-white px-3 py-1 rounded-full border inline-block shadow-sm">${cat === 'is' ? 'İŞ DÜNYASI' : cat.toUpperCase()}</h3>
                                    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2">
                                        ${items.map(item => `<button onclick="app.copySticker('${item}')" class="bg-white p-3 rounded-xl border-2 border-stone-100 font-black hover:border-rose-300 hover:scale-110 transition-all text-stone-600 shadow-sm ${cat === 'emoji' ? 'text-2xl' : 'text-[9px] leading-tight'}">${item}</button>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
                return `<div class="p-20 text-center font-black opacity-10 uppercase tracking-widest">YÜKLENİYOR...</div>`;
            }
        };

        document.addEventListener('DOMContentLoaded', () => window.app.init());
    </script>
</body>
</html>
